# docker-compose.yml
# Run: docker compose up -d
version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: dhanchart_db
    environment:
      POSTGRES_DB:       dhanchart
      POSTGRES_USER:     dhanchart
      POSTGRES_PASSWORD: dhanchart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dhanchart_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dhanchart:dhanchart@db:5432/dhanchart
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dhanchart_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: